<div class="auth-outer">
  <div class="auth-card" style="max-width:420px">
    <div class="auth-logo">
      <img src="assets/wastezero_logo.gif" alt="WasteZero" style="height:52px">
      <h2>WasteZero</h2>
    </div>

    <h4 class="text-center mb-1" style="font-weight:700">Forgot Password</h4>
    <p class="text-center mb-4" style="font-size:0.875rem;color:#64748b">
      Enter your email and we'll send you a reset link.
    </p>

    <div *ngIf="success" class="alert alert-success rounded-3 text-center" role="alert">
      <i class="bi bi-envelope-check-fill me-2"></i>
      {{ successMessage }}
    </div>

    <form *ngIf="!success" (ngSubmit)="submit()" #f="ngForm">
      <div *ngIf="error" class="alert alert-danger rounded-3" role="alert">{{ error }}</div>

      <div class="form-group mb-3">
        <label>Email Address</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          email
          placeholder="you@example.com"
          class="form-control"
          [disabled]="loading"
        />
      </div>

      <button type="submit" class="btn-wz-primary w-100" [disabled]="loading || !email.trim()">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        Send Reset Link
      </button>
    </form>

    <div class="text-center mt-3" style="font-size:0.875rem">
      <a routerLink="/auth" style="color:var(--wz-primary)">Back to Login</a>
    </div>
  </div>
</div>
